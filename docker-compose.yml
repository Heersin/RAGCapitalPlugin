version: "3.9"

services:
  raglocal:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      HOST: ${HOST:-0.0.0.0}
      PORT: 8000
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-60}
      AUTO_INGEST: ${AUTO_INGEST:-true}
      INGEST_DOC_ROOT: ${INGEST_DOC_ROOT:-sample/plugin}
      INGEST_REBUILD: ${INGEST_REBUILD:-false}
      INGEST_ENABLE_PDF: ${INGEST_ENABLE_PDF:-false}
    expose:
      - "8000"
    volumes:
      - raglocal_runtime:/app/runtime
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  raglocal_runtime:
