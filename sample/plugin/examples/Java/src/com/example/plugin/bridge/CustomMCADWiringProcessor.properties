# Used by com.example.plugin.bridge.CustomMCADWiringProcessor

# This .properties file is for use by NX, Pro/ENGINEER, or SolidWorks users
# who might need to fine-tune the wiring export from CHS due to current behavior
# in those applications.

# 'true' to export all shields as wires
# Recommended (set to true) for all three MCAD applications listed above.
Shield_as_wire=true

# 'true' to remove all shields during wiring export
# Recommended (set to true) for Pro/E.
# This setting takes precedence over "Shield_as_wire" setting
Remove_shield=true

# 'true' to export backshells (only with terminations) as connectors
# For use by NX (set to true) only if you must route shields to backshells in NX.
# In general, however, we recommend to set to false for NX.  
# Also not recommended for use with Pro/E and SolidWorks (set to false).
Backshell_as_connector=true

# 'true' to flatten out all the nested multicores
# Set to true especially when exporting to SolidWorks, or Pro/E .nwf file. Set to false for NX.
Flatten_out_nested_multicore=false

#
# Please do not modify anything below this line. For plugin use only.
#
# The following properties are only to track the objects changed by the Processor
#
 
# Name of the 'property' added to a wire (which is converted from a shield)
# by the Processor(Only if Shield_as_wire is 'true').
# The value of this property is 'true'
Shield_wire_identifier=shieldwire
# Name of the 'property' added to a multicore (from which shields are removed)
# by the Processor(Only if Remove_shield is 'true').
# The value of this property is 'true'
Shield_removal_identifier=shieldsremoved

# Name of the 'property' added to a connector (which is converted from a backshell)
# by the Processor(Only if Backshell_as_connector is 'true').
# The value of this property is 'true'
Backshell_connector_identifier=backshellconnector
# Name of the 'property' added to a connector (which is converted from a backshell)
# to identify its 'parent' connector.
# The value of this property is the 'name' of the connector containing the actual backshell
Backshell_container=backshellcontainer

# Name of the 'property' added to the topo most multicore (whose child multicores are flattened out)
# by the Processor(Only if Flatten_out_nested_multicore is 'true').
# The value of this property is 'true'
Nested_multicore=nestedmulticore
# Name of the property added to the wires/shields which are peeled off from a child multicore and
# added to the topo most multicore of the hierarchy.
# The value of the property is a string showing multicore hierarchy using multicore names and
# the 'Hierarchy_separator' specified below.
# For example, if Multicore MC1 contains multicore MC2 which contains a wire W1, then a user property
# 'multicorenesting' is added to W1, which has the value 'MC1>MC2'
Hierarchy_indicator=multicorenesting
# Please see the notes for Hierarchy_indicator
Hierarchy_separator=>